document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

otate(1deg); }\n  }\n  @keyframes arc {\n    0%   { transform: translate(0,0) scale(.9); opacity: 0; }\n    12%  { opacity: 1; }\n    100% { transform: translate(var(--ax,160px), var(--ay,-90px)) scale(1.05); opacity: 0; }\n  }\n  @keyframes glow {\n    0%, 100% { opacity: .55; }\n    50%      { opacity: .9; }\n  }\n  html { scroll-behavior: smooth; }\n  nav span, a { white-space: nowrap; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family: 'Nunito', sans-serif; color: #2c3742; background: #d7e0e8; overflow-x: hidden;\">\n\n  <!-- ====== TOP NAV ====== -->\n  <nav style=\"position: absolute; top: 0; left: 0; right: 0; z-index: 30; display: flex; align-items: center; justify-content: space-between; padding: 22px clamp(20px, 5vw, 64px);\">\n    <div style=\"display: flex; align-items: center; gap: 11px;\">\n      <div style=\"width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #ffffff, #e8eef4 60%, #c3d0db); box-shadow: 0 2px 8px rgba(20,30,45,.35), inset 0 -3px 6px rgba(150,170,190,.5);\"><\u002Fdiv>\n      <span style=\"font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 21px; color: #fff; letter-spacing: .2px; text-shadow: 0 1px 10px rgba(20,30,45,.4);\">Mittens at Dawn<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display: flex; align-items: center; gap: clamp(14px, 2.5vw, 30px);\">\n      <a href=\"#play\" style=\"font-weight: 700; font-size: 15px; color: rgba(255,255,255,.92); text-decoration: none; text-shadow: 0 1px 8px rgba(20,30,45,.4);\">How it Plays<\u002Fa>\n      <a href=\"#factions\" style=\"font-weight: 700; font-size: 15px; color: rgba(255,255,255,.92); text-decoration: none; text-shadow: 0 1px 8px rgba(20,30,45,.4);\">Factions<\u002Fa>\n      <a href=\"#start\" style=\"font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 15px; color: #5b3a1e; text-decoration: none; background: linear-gradient(180deg, #ffce86, #f6a84e); padding: 9px 18px; border-radius: 999px; box-shadow: 0 4px 14px rgba(225,140,50,.45), inset 0 1px 0 rgba(255,255,255,.5);\">Read the Rules<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ====== HERO ====== -->\n  <header style=\"position: relative; min-height: clamp(700px, 95vh, 1010px); overflow: hidden;\">\n\n    <sc-if value=\"{{ isA }}\" hint-placeholder-val=\"{{ true }}\">\n      <!-- VARIANT A — CENTERED POSTER -->\n      <div style=\"position: relative; min-height: clamp(720px, 96vh, 1040px); display: flex; flex-direction: column; align-items: center; padding-bottom: 70px; background: linear-gradient(178deg, #38445c 0%, #4f627c 28%, #8597a6 52%, #cbb290 74%, #f0b06a 90%, #f7c184 100%);\">\n        <div style=\"position: absolute; bottom: 0; left: -5%; width: 110%; height: 340px; background: radial-gradient(ellipse 60% 100% at 50% 100%, rgba(255,196,120,.55), transparent 70%); z-index: 1;\"><\u002Fdiv>\n        <div style=\"position: relative; z-index: 6; max-width: 940px; margin: 0; padding: clamp(104px, 13vh, 150px) 24px 0; text-align: center;\">\n          <div style=\"display: inline-block; font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 13px; letter-spacing: 3px; color: #ffe6c2; text-transform: uppercase; padding: 7px 16px; border: 1.5px solid rgba(255,225,185,.45); border-radius: 999px;\">A Cozy Snowball Skirmish<\u002Fdiv>\n          <h1 style=\"font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(50px, 9.5vw, 116px); line-height: .92; margin: 20px 0 0; color: #fff; letter-spacing: -1px; text-shadow: 0 6px 30px rgba(25,35,55,.45);\">Mittens<br><span style=\"color: #ffd089;\">at Dawn<\u002Fspan><\u002Fh1>\n          <p style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: clamp(19px, 2.6vw, 28px); color: #f4f7fa; margin: 26px auto 0; max-width: 640px; line-height: 1.3; text-shadow: 0 2px 14px rgba(25,35,55,.4);\">The wargame for people who'd <em style=\"font-style: italic; color: #ffd089;\">never<\u002Fem> play a wargame.<\u002Fp>\n          <p style=\"font-size: 17px; color: rgba(255,255,255,.82); max-width: 540px; margin: 16px auto 0; line-height: 1.55;\">Pick a clique. Pack your mittens. Nobody gets eliminated — they just get cold.<\u002Fp>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; margin-top: 34px;\">\n            <a href=\"#start\" style=\"font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 18px; color: #5b3a1e; text-decoration: none; background: linear-gradient(180deg, #ffce86, #f3a247); padding: 15px 30px; border-radius: 999px; box-shadow: 0 8px 22px rgba(225,140,50,.5), inset 0 1px 0 rgba(255,255,255,.55);\">Read the Rules<\u002Fa>\n            <a href=\"#start\" style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 18px; color: #fff; text-decoration: none; background: rgba(255,255,255,.12); border: 1.5px solid rgba(255,255,255,.5); padding: 15px 28px; border-radius: 999px; backdrop-filter: blur(4px);\">Try the Companion App<\u002Fa>\n          <\u002Fdiv>\n          <p style=\"font-family: 'Fredoka', sans-serif; font-size: 14px; color: rgba(255,255,255,.72); margin-top: 22px; letter-spacing: .3px;\">Free forever &nbsp;·&nbsp; 2–6 players &nbsp;·&nbsp; one snowy afternoon<\u002Fp>\n        <\u002Fdiv>\n        <!-- character stage -->\n        <div style=\"position: relative; z-index: 6; margin: 42px auto 0; width: min(880px, 86vw); height: 200px; border-radius: 22px; background: repeating-linear-gradient(45deg, #b3c2d1 0 14px, #c1cedb 14px 28px); border: 2px dashed rgba(70,95,125,.5); display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 50px rgba(30,45,70,.3);\">\n          <span style=\"font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; color: #41566e; background: rgba(255,255,255,.78); padding: 7px 14px; border-radius: 8px; letter-spacing: .2px;\">CHARACTER ART · two cliques squaring off across a snowbank<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isB }}\" hint-placeholder-val=\"{{ false }}\">\n      <!-- VARIANT B — SPLIT EDITORIAL -->\n      <div style=\"position: relative; min-height: clamp(700px, 95vh, 1010px); background: linear-gradient(176deg, #3b4a61 0%, #56698160 40%, #9aa9b8 100%); display: grid; grid-template-columns: 1.05fr 1fr;\">\n        <div style=\"position: relative; z-index: 6; display: flex; flex-direction: column; justify-content: center; padding: 100px clamp(28px, 5vw, 76px) 60px; align-items: flex-start;\">\n          <div style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 13px; letter-spacing: 3px; color: #ffd89f; text-transform: uppercase; margin-bottom: 18px;\">A Cozy Snowball Skirmish<\u002Fdiv>\n          <h1 style=\"font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(48px, 6.6vw, 104px); line-height: .92; margin: 0; color: #fff; letter-spacing: -1px; text-shadow: 0 5px 26px rgba(25,35,55,.45);\">Mittens <span style=\"color: #ffce86;\">at Dawn<\u002Fspan><\u002Fh1>\n          <p style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: clamp(20px, 2.4vw, 30px); color: #eef3f7; margin: 26px 0 0; max-width: 460px; line-height: 1.28;\">The wargame for people who'd <em style=\"font-style: italic; color: #ffce86;\">never<\u002Fem> play a wargame.<\u002Fp>\n          <p style=\"font-size: 17px; color: rgba(255,255,255,.82); max-width: 430px; margin: 18px 0 0; line-height: 1.6;\">No miniatures to paint. No 200-page tome. No one gets knocked out — they just get a little cold and head in for cocoa.<\u002Fp>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 14px; margin-top: 32px;\">\n            <a href=\"#start\" style=\"font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 18px; color: #5b3a1e; text-decoration: none; background: linear-gradient(180deg, #ffce86, #f3a247); padding: 15px 30px; border-radius: 999px; box-shadow: 0 8px 22px rgba(225,140,50,.5), inset 0 1px 0 rgba(255,255,255,    <!-- sun glow -->\n        <div style=\"position: absolute; left: 50%; bottom: 24%; transform: translateX(-50%); width: 520px; height: 520px; border-radius: 50%; background: radial-gradient(circle, rgba(255,214,150,.95), rgba(255,190,120,.45) 38%, transparent 66%); animation: glow 7s ease-in-out infinite; z-index: 1;\"><\u002Fdiv>\n        <!-- distant treeline -->\n        <svg viewBox=\"0 0 1440 200\" preserveAspectRatio=\"none\" style=\"position: absolute; bottom: 30%; left: 0; width: 100%; height: 130px; z-index: 2; opacity: .5;\">\n          <path d=\"M0,200 L0,120 L40,120 L55,80 L70,120 L110,120 L128,70 L146,120 L200,120 L218,92 L236,120 L300,118 L322,64 L344,118 L420,120 L440,86 L460,120 L540,118 L566,60 L592,118 L680,120 L700,90 L720,120 L820,118 L846,58 L872,118 L980,120 L1004,88 L1028,120 L1130,118 L1156,62 L1182,118 L1290,120 L1314,86 L1338,120 L1440,120 L1440,200 Z\" fill=\"#3a4860\"><\u002Fpath>\n        <\u002Fsvg>\n        <!-- snow foreground -->\n        <svg viewBox=\"0 0 1440 360\" preserveAspectRatio=\"none\" style=\"position: absolute; bottom: 0; left: 0; width: 100%; height: 42%; z-index: 3;\">\n          <path d=\"M0,150 C 260,80 520,170 760,120 C 1000,72 1240,160 1440,110 L1440,360 L0,360 Z\" fill=\"#e9ddc9\"><\u002Fpath>\n          <path d=\"M0,210 C 300,150 560,230 820,185 C 1080,142 1280,210 1440,180 L1440,360 L0,360 Z\" fill=\"#f4ecdd\"><\u002Fpath>\n        <\u002Fsvg>\n        <!-- arcing snowballs -->\n        <span style=\"position: absolute; left: 30%; bottom: 40%; width: 11px; height: 11px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(40,55,80,.4); --ax: 220px; --ay: -70px; animation: arc 3.6s ease-out 0s infinite; z-index: 4;\"><\u002Fspan>\n        <span style=\"position: absolute; left: 64%; bottom: 44%; width: 9px; height: 9px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(40,55,80,.4); --ax: -190px; --ay: -56px; animation: arc 4.2s ease-out 1.1s infinite; z-index: 4;\"><\u002Fspan>\n        <div style=\"position: relative; z-index: 6; max-width: 900px; margin: 0 auto; padding: clamp(150px, 22vh, 240px) 24px 0; text-align: center;\">\n          <div style=\"display: inline-block; font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 13px; letter-spacing: 3px; color: #fff4e3; text-transform: uppercase; padding: 7px 16px; border-radius: 999px; background: rgba(50,65,90,.3); backdrop-filter: blur(3px);\">A Cozy Snowball Skirmish<\u002Fdiv>\n          <h1 style=\"font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(56px, 11.5vw, 150px); line-height: .9; margin: 20px 0 0; color: #fff; letter-spacing: -1.5px; text-shadow: 0 8px 34px rgba(25,35,55,.5);\">Mittens at Dawn<\u002Fh1>\n          <p style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: clamp(19px, 2.6vw, 27px); color: #fdf4e8; margin: 24px auto 0; max-width: 600px; line-height: 1.3; text-shadow: 0 2px 16px rgba(25,35,55,.5);\">The only casualty is your dignity.<\u002Fp>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; margin-top: 32px;\">\n            <a href=\"#start\" style=\"font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 18px; color: #5b3a1e; text-decoration: none; background: linear-gradient(180deg, #ffce86, #f3a247); padding: 15px 30px; border-radius: 999px; box-shadow: 0 8px 22px rgba(225,140,50,.5), inset 0 1px 0 rgba(255,255,255,.55);\">Read the Rules<\u002Fa>\n            <a href=\"#start\" style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 18px; color: #fff; text-decoration: none; background: rgba(255,255,255,.14); border: 1.5px solid rgba(255,255,255,.55); padding: 15px 28px; border-radius: 999px; backdrop-filter: blur(4px);\">Try the Companion App<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    {{ snowLayer }}\n\n    <!-- snowbank base over hero bottom (shared) -->\n    <svg viewBox=\"0 0 1440 110\" preserveAspectRatio=\"none\" style=\"position: absolute; bottom: -1px; left: 0; width: 100%; height: 90px; z-index: 5;\">\n      <path d=\"M0,60 C 260,20 520,80 760,50 C 1000,22 1240,70 1440,44 L1440,110 L0,110 Z\" fill=\"#f4ecdd\"><\u002Fpath>\n    <\u002Fsvg>\n  <\u002Fheader>\n\n  <!-- ====== HOW IT PLAYS ====== -->\n  <section id=\"play\" style=\"position: relative; background: linear-gradient(180deg, #f4ecdd 0%, #e3e9ef 22%, #dde6ed 100%); padding: clamp(70px, 9vw, 120px) clamp(20px, 5vw, 64px) clamp(80px, 10vw, 130px);\">\n    <div style=\"max-width: 1140px; margin: 0 auto;\">\n      <div style=\"text-align: center; max-width: 720px; margin: 0 auto;\">\n        <div style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 13px; letter-spacing: 3px; color: #d98b3e; text-transform: uppercase;\">How it Plays<\u002Fdiv>\n        <h2 style=\"font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(34px, 5.2vw, 60px); line-height: 1.04; color: #2c3742; margin: 14px 0 0; letter-spacing: -.5px;\">It's a snowball fight.<br>That's the whole pitch.<\u002Fh2>\n        <p style=\"font-size: 18px; color: #56636f; line-height: 1.6; margin: 20px 0 0;\">If you can build a snowman, you already know the rules. Here's everything you actually need to remember.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(248px, 1fr)); gap: 22px; margin-top: 56px;\">\n        <div style=\"background: #fff; border-radius: 22px; padding: 30px 26px; box-shadow: 0 14px 34px rgba(60,80,110,.12); border: 1px solid rgba(120,140,165,.14);\">\n          <div style=\"width: 54px; height: 54px; border-radius: 16px; background: linear-gradient(180deg, #cfe0ee, #aac3dc); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 -3px 6px rgba(120,150,180,.4);\"><div style=\"width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: 0 2px 5px rgba(40,60,90,.3);\"><\u002Fdiv><\u002Fdiv>\n          <h3 style=\"font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 22px; color: #2c3742; margin: 20px 0 8px;\">Pack &amp; throw<\u002Fh3>\n          <p style=\"font-size: 15.5px; color: #5b6873; line-height: 1.62; margin: 0;\">Measure a toss with a piece of string, lob your snowball, and hope it lands. Range is something you eyeball — not a calculator.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #fff; border-radius: 22px; padding: 30px 26px; box-shadow: 0 14px 34px rgba(60,80,110,.12); border: 1px solid rgba(120,140,165,.14);\">\n          <div style=\"width: 54px; height: 54px; border-radius: 16px; background: linear-gradient(180deg, #ffe0b3, #f6b162); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 -3px 6px rgba(210,150,70,.4);\"><div style=\"width: 22px; height: 22px; border-radius: 7px; background: #fff; transform: rotate(45deg); box-shadow: 0 2px 5px rgba(120,80,30,.3);\"><\u002Fdiv><\u002Fdiv>\n          <h3 style=\"font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 22px; color: #2c3742; margin: 20px 0 8px;\">Nobody gets knocked out<\u002Fh3>\n          <p style=\"font-size: 15.5px; color: #5b6873; line-height: 1.62; margin: 0;\">Take enough hits and you're <strong style=\"color: #2c3742;\">Frozen<\u002Fstrong>: warm up by the fire, sit out a turn, hop right back in. No characters ever leave the table.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #fff; border-radius: 22px; padding: 30px 26px; box-shadow: 0 14px 34px rgba(60,80,110,.12); border: 1px solid rgba(120,140,165,.14);\">\n          <div style=\"width: 54px; height: 54px; border-radius: 16px; background: linear-gradient(180deg, #cfe0ee, #9fbdd8); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 -3px 6px rgba(120,150,180,.4);\"><div style=\"width: 24px; height: 24px; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 2px 5px rgba(40,60,90,.3);\"><\u002Fdiv><\u002Fdiv>\n          <h3 style=\"font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 22px; color: #2c3742; margin: 20px 0 8px;\">The cold is the clock<\u002Fh3>\n          <p style=\"font-size: 15.5px; color: #5b6873; line-height: 1.62; margin: 0;\">Each round the chill creeps up a notch. When your whole crew is too cold to keep going, you call it and head inside for cocoa.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #fff; border-radius: 22px; padding: 30px 26px; box-shadow: 0 14px 34px rgba(60,80,110,.12); border: 1px solid rgba(120,140,165,.14);\">\n          <div style=\"width: 54px; height: 54px; border-radius: 16px; background: linear-gradient(180deg, #ffe0b3, #ef9a4f); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 -3px 6px rgba(210,150,70,.4);\"><div style=\"font-family: 'Fredoka', sans-serif; font-weight: 700; color: #fff; font-size: 24px;\">★<\u002Fdiv><\u002Fdiv>\n          <h3 style=\"font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 22px; color: #2c3742; margin: 20px 0 8px;\">Last clique outside wins<\u002Fh3>\n          <p style=\"font-size: 15.5px; color: #5b6873; line-height: 1.62; margin: 0;\">No kill counts. No dice tables to memorize. Whichever team is still out in the snow gets bragging rights — until tomorrow, anyway.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top: 34px; background: linear-gradient(180deg, #ffffff, #fbf5ea); border: 1.5px dashed rgba(214,140,62,.5); border-radius: 20px; padding: 24px 30px; text-align: center; box-shadow: 0 10px 28px rgba(214,140,62,.1);\">\n        <p style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: clamp(18px, 2.3vw, 24px); color: #b3692a; margin: 0; line-height: 1.4;\">No painting. No rulebook the size of a phone book. No one dies. Truly — it's just a snow day with sides.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ====== FACTIONS ====== -->\n  <section id=\"factions\" style=\"position: relative; background: linear-gradient(180deg, #dde6ed 0%, #c6d3df 100%); padding: clamp(70px, 9vw, 120px) clamp(20px, 5vw, 64px) clamp(80px, 10vw, 130px);\">\n    <div style=\"max-width: 1160px; margin: 0 auto;\">\n      <div style=\"text-align: center; max-width: 720px; margin: 0 auto;\">\n        <div style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 13px; letter-spacing: 3px; color: #d98b3e; text-transform: uppercase;\">Choose your Clique<\u002Fdiv>\n        <h2 style=\"font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(34px, 5.2vw, 60px); line-height: 1.04; color: #2c3742; margin: 14px 0 0; letter-spacing: -.5px;\">Two teams. One playground.<br>Zero chill.<\u002Fh2>\n        <p style=\"font-size: 18px; color: #51606c; line-height: 1.6; margin: 20px 0 0;\">Same recess, opposite philosophies. Pick the side that plays the way you do.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 26px; margin-top: 56px;\">\n        <!-- MISFITS -->\n        <div style=\"background: linear-gradient(180deg, #fff7ec, #fdedd8); border-radius: 26px; overflow: hidden; box-shadow: 0 20px 46px rgba(180,110,40,.18); border: 1px solid rgba(214,140,62,.25);\">\n          <div style=\"position: relative; height: 280px; background: repeating-linear-gradient(45deg, #f3c98f 0 16px, #efc081 16px 32px); display: flex; align-items: center; justify-content: center;\">\n            <div style=\"position: absolute; inset: 0; background: radial-gradient(circle at 50% 30%, rgba(255,210,150,.5), transparent 70%);\"><\u002Fdiv>\n            <span style=\"position: relative; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 12.5px; color: #7c4d1c; background: rgba(255,255,255,.82); padding: 8px 14px; border-radius: 8px; text-align: center; max-width: 78%; line-height: 1.5;\">CHARACTER ART · the Misfits mid-ambush, mismatched mittens<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding: 30px 30px 34px;\">\n            <div style=\"display: inline-block; font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; background: #e1853a; padding: 5px 13px; border-radius: 999px;\">Scrappy Underdogs<\u002Fdiv>\n            <h3 style=\"font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(28px, 3.4vw, 38px); color: #2c3742; margin: 16px 0 0; letter-spacing: -.5px;\">The Mudroom Misfits<\u002Fh3>\n            <p style=\"font-size: 16px; color: #6b5440; line-height: 1.62; margin: 12px 0 0;\">Mismatched mittens, bottomless pockets, and a snowball already in hand. They don't plan — they pounce, scatter, and pounce again before you've looked up.<\u002Fp>\n            <div style=\"display: flex; flex-wrap: wrap; gap: 9px; margin-top: 22px;\">\n              <span style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 14px; color: #9c5e26; background: rgba(225,133,58,.14); padding: 7px 15px; border-radius: 999px;\">Ambush<\u002Fspan>\n              <span style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 14px; color: #9c5e26; background: rgba(225,133,58,.14); padding: 7px 15px; border-radius: 999px;\">Improvise<\u002Fspan>\n              <span style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 14px; color: #9c5e26; background: rgba(225,133,58,.14); padding: 7px 15px; border-radius: 999px;\">Outnumbered &amp; loving it<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- HALL MONITORS -->\n        <div style=\"background: linear-gradient(180deg, #f3f7fb, #dce8f1); border-radius: 26px; overflow: hidden; box-shadow: 0 20px 46px rgba(50,80,120,.18); border: 1px solid rgba(90,120,155,.25);\">\n          <div style=\"position: relative; height: 280px; background: repeating-linear-gradient(45deg, #a9c0d4 0 16px, #9bb5cc 16px 32px); display: flex; align-items: center; justify-content: center;\">\n            <div style=\"position: absolute; inset: 0; background: radial-gradient(circle at 50% 30%, rgba(225,238,250,.5), transparent 70%);\"><\u002Fdiv>\n            <span style=\"position: relative; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 12.5px; color: #2f4965; background: rgba(255,255,255,.85); padding: 8px 14px; border-radius: 8px; text-align: center; max-width: 78%; line-height: 1.5;\">CHARACTER ART · the Hall Monitors in formation behind a tidy fort<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding: 30px 30px 34px;\">\n            <div style=\"display: inline-block; font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; background: #4f7398; padding: 5px 13px; border-radius: 999px;\">Disciplined Defenders<\u002Fdiv>\n            <h3 style=\"font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(28px, 3.4vw, 38px); color: #2c3742; margin: 16px 0 0; letter-spacing: -.5px;\">The Hall Monitors<\u002Fh3>\n            <p style=\"font-size: 16px; color: #46586a; line-height: 1.62; margin: 12px 0 0;\">Matching scarves, tidy forts, and a laminated schedule for everything. They hold the line, ration their snowballs, and wait for you to make the first mistake.<\u002Fp>\n            <div style=\"display: flex; flex-wrap: wrap; gap: 9px; margin-top: 22px;\">\n              <span style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 14px; color: #3c5a7a; background: rgba(79,115,152,.14); padding: 7px 15px; border-radius: 999px;\">Formation<\u002Fspan>\n              <span style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 14px; color: #3c5a7a; background: rgba(79,115,152,.14); padding: 7px 15px; border-radius: 999px;\">Fortify<\u002Fspan>\n              <span style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 14px; color: #3c5a7a; background: rgba(79,115,152,.14); padding: 7px 15px; border-radius: 999px;\">Endless patience<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"text-align: center; font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 17px; color: #5a6b7a; margin: 36px 0 0;\">More cliques are out building forts. New teams drop with every season.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ====== CTA ====== -->\n  <section id=\"start\" style=\"position: relative; overflow: hidden; background: linear-gradient(180deg, #c6d3df 0%, #d9c19a 46%, #f0bd7e 100%); padding: clamp(80px, 11vw, 150px) clamp(20px, 5vw, 64px) clamp(70px, 9vw, 120px);\">\n    <div style=\"position: absolute; top: -10%; left: 50%; transform: translateX(-50%); width: 720px; height: 720px; border-radius: 50%; background: radial-gradient(circle, rgba(255,222,165,.85), transparent 62%); z-index: 0; animation: glow 8s ease-in-out infinite;\"><\u002Fdiv>\n    <div style=\"position: relative; z-index: 3; max-width: 760px; margin: 0 auto; text-align: center;\">\n      <div style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 13px; letter-spacing: 3px; color: #a35f22; text-transform: uppercase;\">Grab your mittens<\u002Fdiv>\n      <h2 style=\"font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(40px, 6.4vw, 76px); line-height: 1; color: #3a2c1a; margin: 14px 0 0; letter-spacing: -1px;\">Come in from the cold.<\u002Fh2>\n      <p style=\"font-size: 19px; color: #6a5436; line-height: 1.6; margin: 22px auto 0; max-width: 540px;\">The full rules are free, and the companion app tracks the cold so you don't have to. Round up four friends and a fresh snowfall — that's the whole shopping list.<\u002Fp>\n      <div style=\"display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; margin-top: 38px;\">\n        <a href=\"#start\" style=\"font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 19px; color: #5b3a1e; text-decoration: none; background: linear-gradient(180deg, #ffffff, #fff0d6); padding: 17px 36px; border-radius: 999px; box-shadow: 0 12px 30px rgba(150,95,35,.35), inset 0 1px 0 rgba(255,255,255,.8);\">Read the Rules<\u002Fa>\n        <a href=\"#start\" style=\"font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 19px; color: #fff; text-decoration: none; background: linear-gradient(180deg, #e8884a, #d96e2f); padding: 17px 36px; border-radius: 999px; box-shadow: 0 12px 30px rgba(180,95,40,.45), inset 0 1px 0 rgba(255,255,255,.35);\">Start Playing<\u002Fa>\n      <\u002Fdiv>\n      <p style=\"font-family: 'Fredoka', sans-serif; font-size: 15px; color: #8a6c45; margin-top: 26px; letter-spacing: .3px;\">No account &nbsp;·&nbsp; no cost &nbsp;·&nbsp; no casualties<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ====== FOOTER ====== -->\n  <footer style=\"background: #313f54; padding: 40px clamp(20px, 5vw, 64px); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 18px;\">\n    <div style=\"display: flex; align-items: center; gap: 11px;\">\n      <div style=\"width: 26px; height: 26px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #ffffff, #d3dde6 60%, #aebccb);\"><\u002Fdiv>\n      <span style=\"font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 18px; color: #fff;\">Mittens at Dawn<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-family: 'Fredoka', sans-serif; font-size: 14px; color: rgba(255,255,255,.6); margin: 0;\">Made for snow days. Free forever.<\u002Fp>\n    <div style=\"display: flex; gap: 22px;\">\n      <a href=\"#play\" style=\"font-weight: 700; font-size: 14px; color: rgba(255,255,255,.78); text-decoration: none;\">How it Plays<\u002Fa>\n      <a href=\"#factions\" style=\"font-weight: 700; font-size: 14px; color: rgba(255,255,255,.78); text-decoration: none;\">Factions<\u002Fa>\n      <a href=\"#start\" style=\"font-weight: 700; font-size: 14px; color: #ffce86; text-decoration: none;\">Read the Rules<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ====== HERO PREVIEW SWITCHER (floating control) ====== -->\n  <div style=\"position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 90; display: flex; align-items: center; gap: 8px; background: rgba(30,40,55,.86); backdrop-filter: blur(8px); padding: 7px 9px 7px 16px; border-radius: 999px; box-shadow: 0 10px 30px rgba(20,30,45,.45); border: 1px solid rgba(255,255,255,.12);\">\n    <span style=\"font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 12px; letter-spacing: 1.5px; color: rgba(255,255,255,.6); text-transform: uppercase;\">Hero<\u002Fspan>\n    <button onclick=\"{{ setHeroA }}\" style=\"{{ aStyle }}\">Poster<\u002Fbutton>\n    <button onclick=\"{{ setHeroB }}\" style=\"{{ bStyle }}\">Split<\u002Fbutton>\n    <button onclick=\"{{ setHeroC }}\" style=\"{{ cStyle }}\">Horizon<\u002Fbutton>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { hero: 'a' };\n\n  snow = Array.from({ length: 48 }, () => {\n    const r = (a, b) => a + Math.random() * (b - a);\n    return {\n      left: (Math.random() * 100).toFixed(2) + '%',\n      size: r(3, 9).toFixed(1) + 'px',\n      op: Number(r(0.35, 0.95).toFixed(2)),\n      dur: r(8, 17).toFixed(1),\n      delay: (-r(0, 17)).toFixed(1),\n      drift: r(-30, 45).toFixed(0) + 'px',\n    };\n  });\n\n  renderVals() {\n    const h = this.state.hero;\n    const base = { fontFamily: \"'Fredoka', sans-serif\", fontWeight: 600, fontSize: '13px', padding: '7px 15px', borderRadius: '999px', border: 'none', cursor: 'pointer', transition: 'all .18s' };\n    const on = Object.assign({}, base, { background: 'linear-gradient(180deg,#ffce86,#f3a247)', color: '#5b3a1e' });\n    const off = Object.assign({}, base, { background: 'transparent', color: 'rgba(255,255,255,.72)' });\n\n    const snowLayer = React.createElement(\n      'div',\n      { style: { position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none', zIndex: 4 } },\n      this.snow.map((f, i) =>\n        React.createElement('span', {\n          key: i,\n          style: {\n            position: 'absolute', left: f.left, top: '-14px',\n            width: f.size, height: f.size, borderRadius: '50%',\n            background: '#fff', opacity: f.op, filter: 'blur(.3px)',\n            '--drift': f.drift,\n            animation: 'snowfall ' + f.dur + 's linear ' + f.delay + 's infinite',\n          },\n        })\n      )\n    );\n\n    return {\n      isA: h === 'a', isB: h === 'b', isC: h === 'c',\n      setHeroA: () => this.setState({ hero: 'a' }),\n      setHeroB: () => this.setState({ hero: 'b' }),\n      setHeroC: () => this.setState({ hero: 'c' }),\n      aStyle: h === 'a' ? on : off,\n      bStyle: h === 'b' ? on : off,\n      cStyle: h === 'c' ? on : off,\n      snowLayer,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
