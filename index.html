<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mittens at Dawn — Under Construction</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Minimal Brand Header -->
    <nav class="navbar">
      <div class="nav-logo">
        <div class="logo-sphere"></div>
        <span class="logo-text">Mittens <span class="highlight">at Dawn</span></span>
      </div>
    </nav>

    <!-- ====== MAIN UNDER CONSTRUCTION CONTAINER ====== -->
    <main class="construction-container">
      <!-- 90s Inspired Animated Vector Shovel Worker -->
      <div class="worker-graphic-wrapper">
        <svg class="shovel-worker-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="70" fill="rgba(255, 206, 134, 0.15)" />

          <path d="M 20 160 Q 100 130 180 160 Z" fill="#e9ddc9" />
          <path d="M 50 160 Q 100 145 150 160 Z" fill="#f4ecdd" />

          <g class="worker-body-idle">
            <path d="M 60 160 L 75 110 L 105 110 L 115 160 Z" fill="#e8884a" />
            <path d="M 75 110 L 80 160 M 100 110 L 95 160" stroke="#ffce86" stroke-width="4" />
            <circle cx="90" cy="90" r="16" fill="#fddcb4" />
            <path d="M 74 88 C 74 70 106 70 106 88 Z" fill="#4f7398" />
            <circle cx="90" cy="70" r="5" fill="#fff" />
          </g>

          <g class="worker-arm-dig">
            <g class="shovel-tool">
              <line
                x1="85"
                y1="125"
                x2="140"
                y2="155"
                stroke="#8a6c45"
                stroke-width="5"
                stroke-linecap="round" />
              <path d="M 135 150 L 155 160 L 145 170 L 128 158 Z" fill="#aebccb" />
            </g>
          </g>
        </svg>

        <div class="snowball-x-axis">
          <span class="snowball-y-axis"></span>
        </div>
      </div>

      <!-- Retro-style Warning Barrier Stripes with cozy colors -->
      <div class="hazard-stripes"></div>

      <!-- Alert Text Group -->
      <div class="alert-content">
        <h1 class="construction-title">Fort Under Construction</h1>
        <p class="construction-text">
          We're out in the yard packing down the rules, clearing off the playing board, and
          stockpiling snowballs.
        </p>

        <!-- 90s Style Web Counter Concept -->
        <div class="counter-box">
          <span class="counter-label">SNOWDAYS UNTIL LAUNCH:</span>
          <div class="counter-digits"><span>0</span><span>0</span><span>4</span><span>2</span></div>
        </div>

        <!-- Clean Email Signup Placeholder for GitHub Pages -->
        <div class="signup-zone">
          <p class="signup-hint">Want a heads up when the recess bell rings?</p>
          <form
            class="signup-form"
            onsubmit="
              event.preventDefault();
              alert('Thanks for bundling up! We will let you know when we launch.');
            ">
            <input
              type="email"
              placeholder="Enter your email address..."
              required
              class="signup-input" />
            <button type="submit" class="btn-primary">Get Notified</button>
          </form>
        </div>
      </div>

      <div class="hazard-stripes"></div>
    </main>

    <!-- ====== BACKGROUND SYSTEM ====== -->
    <div class="hero-sun-glow"></div>

    <svg viewBox="0 0 1440 200" preserveAspectRatio="none" class="horizon-treeline">
      <path
        d="M0,200 L0,120 L40,120 L55,80 L70,120 L110,120 L128,70 L146,120 L200,120 L218,92 L236,120 L300,118 L322,64 L344,118 L420,120 L440,86 L460,120 L540,118 L566,60 L592,118 L680,120 L700,90 L720,120 L820,118 L846,58 L872,118 L980,120 L1004,88 L1028,120 L1130,118 L1156,62 L1182,118 L1290,120 L1314,86 L1338,120 L1440,120 L1440,200 Z"
        fill="#3a4860"></path>
    </svg>

    <svg viewBox="0 0 1440 360" preserveAspectRatio="none" class="horizon-snow-bg">
      <path
        d="M0,150 C 260,80 520,170 760,120 C 1000,72 1240,160 1440,110 L1440,360 L0,360 Z"
        fill="#e9ddc9"></path>
      <path
        d="M0,210 C 300,150 560,230 820,185 C 1080,142 1280,210 1440,180 L1440,360 L0,360 Z"
        fill="#f4ecdd"></path>
    </svg>

    <div id="snow-layer"></div>

    <script src="script.js"></script>
  </body>
</html>
